<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06C755" />
    </linearGradient>
  </defs>

  <!-- Icon mark (matches favicon) -->
  <rect x="4" y="8" width="56" height="56" rx="13" fill="url(#logo-grad)" />

  <!-- Mini calendar -->
  <rect x="11" y="20" width="22" height="20" rx="3.5" fill="#fff" opacity="0.95" />
  <rect x="11" y="20" width="22" height="7" rx="3.5" fill="#fff" />
  <rect x="11" y="25" width="22" height="2" fill="rgba(79,70,229,0.2)" />
  <rect x="16" y="17" width="2.5" height="5" rx="1.25" fill="#fff" />
  <rect x="25" y="17" width="2.5" height="5" rx="1.25" fill="#fff" />
  <circle cx="17" cy="34" r="1.8" fill="#4f46e5" opacity="0.5" />
  <circle cx="22" cy="34" r="1.8" fill="#4f46e5" opacity="0.35" />
  <circle cx="27" cy="34" r="1.8" fill="#4f46e5" opacity="0.25" />

  <!-- Arrow -->
  <line x1="35" y1="33" x2="43" y2="33" stroke="#fff" stroke-width="2.2" stroke-linecap="round" />
  <polyline points="40,29 45,33 40,37" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- LINE bubble -->
  <rect x="36" y="40" width="18" height="14" rx="5" fill="#fff" opacity="0.95" />
  <polygon points="39,54 42,57 45,54" fill="#fff" opacity="0.95" />
  <text x="39.5" y="52" font-family="'Segoe UI', -apple-system, sans-serif" font-size="11" font-weight="800" fill="#06C755">L</text>

  <!-- Notification dot -->
  <circle cx="56" cy="12" r="5" fill="#f59e0b" />

  <!-- CalPush text -->
  <text x="72" y="50" font-family="'Segoe UI', -apple-system, sans-serif" font-size="42" font-weight="800" fill="#1e293b">Cal</text>
  <text x="152" y="50" font-family="'Segoe UI', -apple-system, sans-serif" font-size="42" font-weight="800" fill="#4f46e5">Push</text>
</svg>

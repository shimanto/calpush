<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#eef2ff" />
      <stop offset="100%" stop-color="#ecfdf5" />
    </linearGradient>
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06C755" />
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06C755" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle decorative shapes -->
  <circle cx="80" cy="60" r="180" fill="#4f46e5" opacity="0.03" />
  <circle cx="1120" cy="570" r="200" fill="#06C755" opacity="0.03" />
  <circle cx="600" cy="300" r="400" fill="#4f46e5" opacity="0.015" />

  <!-- === Central icon group === -->
  <g transform="translate(310, 100)">

    <!-- Calendar icon -->
    <g transform="translate(0, 20)">
      <rect x="0" y="12" width="120" height="100" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="2" />
      <rect x="0" y="12" width="120" height="32" rx="16" fill="#4f46e5" />
      <rect x="0" y="32" width="120" height="12" fill="#4f46e5" />
      <!-- Pins -->
      <rect x="28" y="4" width="8" height="18" rx="4" fill="#1e293b" />
      <rect x="84" y="4" width="8" height="18" rx="4" fill="#1e293b" />
      <!-- Grid -->
      <rect x="18" y="58" width="18" height="14" rx="3" fill="#4f46e5" opacity="0.15" />
      <rect x="44" y="58" width="18" height="14" rx="3" fill="#4f46e5" opacity="0.1" />
      <rect x="70" y="58" width="18" height="14" rx="3" fill="#4f46e5" opacity="0.15" />
      <rect x="18" y="80" width="18" height="14" rx="3" fill="#4f46e5" opacity="0.08" />
      <rect x="44" y="80" width="18" height="14" rx="3" fill="#f59e0b" opacity="0.3" />
      <rect x="70" y="80" width="18" height="14" rx="3" fill="#4f46e5" opacity="0.08" />
      <!-- Calendar label -->
      <text x="60" y="36" text-anchor="middle" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="700" fill="#fff" opacity="0.9">CALENDAR</text>
    </g>

    <!-- Animated-style arrow flow -->
    <g transform="translate(140, 68)">
      <circle cx="30" cy="0" r="5" fill="#4f46e5" opacity="0.3" />
      <circle cx="55" cy="0" r="5" fill="#4f46e5" opacity="0.15" />

      <line x1="10" y1="0" x2="95" y2="0" stroke="url(#arrow-grad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6" />
      <polygon points="95,-10 115,0 95,10" fill="#06C755" />
    </g>

    <!-- LINE bubble -->
    <g transform="translate(270, 16)">
      <rect x="0" y="0" width="120" height="90" rx="18" fill="#06C755" />
      <polygon points="22,90 36,108 50,90" fill="#06C755" />
      <!-- LINE text -->
      <text x="20" y="70" font-family="'Segoe UI', -apple-system, sans-serif" font-size="56" font-weight="800" fill="#fff">L</text>
      <text x="52" y="62" font-family="'Segoe UI', -apple-system, sans-serif" font-size="28" font-weight="600" fill="#fff" opacity="0.9">INE</text>
    </g>

    <!-- Notification dot with exclamation -->
    <circle cx="398" cy="12" r="14" fill="#f59e0b" />
    <text x="393.5" y="18" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#fff">!</text>

  </g>

  <!-- CalPush text -->
  <text x="600" y="310" text-anchor="middle" font-family="'Segoe UI', -apple-system, 'Hiragino Sans', sans-serif" font-size="76" font-weight="800" fill="#1e293b" letter-spacing="-2">Cal<tspan fill="#4f46e5" font-weight="800">Push</tspan></text>

  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="'Segoe UI', -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" fill="#64748b">Google Calendar × Gmail × LINE 自動通知</text>

  <!-- Sub-description -->
  <text x="600" y="416" text-anchor="middle" font-family="'Segoe UI', -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="21" fill="#94a3b8">サーバー不要 ・ 完全無料 ・ 5分でセットアップ</text>

  <!-- Three feature pills -->
  <g transform="translate(250, 460)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="200" height="52" rx="26" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" />
    <circle cx="30" cy="26" r="14" fill="#eef2ff" />
    <text x="26" y="32" font-size="16">📅</text>
    <text x="54" y="32" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif" font-size="15" font-weight="600" fill="#4f46e5">カレンダー連携</text>

    <!-- Pill 2 -->
    <rect x="220" y="0" width="200" height="52" rx="26" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" />
    <circle cx="250" cy="26" r="14" fill="#ecfdf5" />
    <text x="246" y="32" font-size="16">✉️</text>
    <text x="274" y="32" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif" font-size="15" font-weight="600" fill="#059669">Gmail転送</text>

    <!-- Pill 3 -->
    <rect x="440" y="0" width="200" height="52" rx="26" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" />
    <circle cx="470" cy="26" r="14" fill="#f0fdf4" />
    <text x="466" y="32" font-size="16">💬</text>
    <text x="494" y="32" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif" font-size="15" font-weight="600" fill="#06C755">LINE通知</text>
  </g>

  <!-- Bottom gradient bar -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#arrow-grad)" rx="0" />
</svg>

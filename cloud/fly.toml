app = 'calpush-cloud'
primary_region = 'nrt'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  DATABASE_URL = 'file:/data/calpush.db'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = 'calpush_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[checks]
  [checks.health]
    type = 'http'
    port = 3000
    path = '/'
    interval = '30s'
    timeout = '5s'
